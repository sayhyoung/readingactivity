<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🏫 윤선생 내신 프렙</title>
  
  <!-- External Libraries -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" crossorigin="anonymous" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/2.1.4/tesseract.min.js"></script>
  
  <!-- Local Styles -->
  <link rel="stylesheet" href="styles.css">
  
  <!-- Local Scripts -->
  <script src="app.js"></script>
  
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-2ST2J98RHE"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-2ST2J98RHE');
  </script>
</head>
<body>
  <!-- Class Booster 스타일 컨테이너 -->
  <div class="cb-app-wrapper">
    
    <!-- Class Booster 스타일 헤더 -->
    <div class="cb-header">
      <div class="cb-header-content">
        <div class="cb-module-icon">
          <i class="fas fa-pen-to-square"></i>
        </div>
        <div class="cb-header-info">
          <h1>💫 윤선생 내신 프렙 💫</h1>
          <p>AI 기반 영어 지문 분석 및 문제 생성 도구</p>
        </div>
      </div>
    </div>

    <!-- Class Booster 스타일 탭 네비게이션 -->
    <div class="cb-nav-container">
      <div class="tabs cb-tabs">
        <button class="cb-tab-btn active" onclick="showSection('upload')">
          <i class="fas fa-upload"></i> 지문 업로드
        </button>
        <button class="cb-tab-btn" onclick="showSection('modeSelect')">
          <i class="fas fa-layer-group"></i> 모드 선택
        </button>
        <button class="cb-tab-btn" onclick="showSection('activity')">
          <i class="fas fa-chalkboard-teacher"></i> 활동/문항 생성
        </button>
        <button class="cb-tab-btn" onclick="showSection('activityCheck')">
          <i class="fas fa-check-square"></i> 결과 확인
        </button>
      </div>
    </div>

    <!-- 기존 컨테이너 구조 유지 -->
    <div class="container">
      
      <!-- Upload Section (기존 스타일 유지) -->
      <div id="upload" class="section">
        <h2><i class="fas fa-file-alt"></i> 지문 업로드</h2>
        <textarea id="passage" placeholder="이곳에 영어 지문을 직접 입력하거나, 아래 버튼으로 이미지를 업로드하면 자동으로 텍스트가 추출됩니다." rows="8"></textarea>
        
        <!-- 카메라/파일 업로드 아이콘 버튼 -->
        <div class="upload-icons">
          <button type="button" class="icon-btn" onclick="document.getElementById('cameraInput').click()" title="카메라로 촬영">
            <i class="fas fa-camera"></i>
          </button>
          <button type="button" class="icon-btn" onclick="document.getElementById('fileInput').click()" title="이미지 파일 선택">
            <i class="fas fa-image"></i>
          </button>
        </div>
        
        <!-- Hidden file inputs -->
        <input type="file" id="cameraInput" accept="image/*" capture="environment" onchange="handleFileChange(this)" style="display: none;">
        <input type="file" id="fileInput" accept="image/*" onchange="handleFileChange(this)" style="display: none;">
        
        <button onclick="showSection('modeSelect')">
          <i class="fas fa-check"></i> 입력 완료
        </button>
        <button class="reset-btn" onclick="resetUpload()">
          <i class="fas fa-redo"></i> 초기화
        </button>
      </div>

      <!-- Mode Selection Section (기존 스타일 유지) -->
      <div id="modeSelect" class="section" style="display:none;">
        <h2><i class="fas fa-layer-group"></i> 모드 선택</h2>
        <p style="margin-bottom: 20px; color: #666;">📌 생성할 자료의 유형을 선택하세요 (하나만 선택 가능):</p>
        
        <div class="mode-selection">
          <div class="mode-card" onclick="selectMode('worksheet')">
            <div class="mode-icon"><i class="fas fa-pen-fancy"></i></div>
            <h3>워크시트 활동</h3>
            <p>단어 익히기, 문장 해석, 빈칸 채우기 등 학습 워크시트 생성</p>
          </div>
          
          <div class="mode-card" onclick="selectMode('exam')">
            <div class="mode-icon"><i class="fas fa-file-alt"></i></div>
            <h3>시험 대비 문항</h3>
            <p>학교 내신 및 각종 시험 대비용 독해 문항 생성</p>
          </div>
        </div>
      </div>

      <!-- Activity Generation Section (기존 UI 유지, 배경만 변경) -->
      <div id="activity" class="section cb-activity-section" style="display:none;">
        <h2 id="activityTitle"><i class="fas fa-chalkboard-teacher"></i> 활동 생성</h2>
        <div id="activityContent"></div>
        
        <button onclick="generateActivity()">
          <i class="fas fa-play"></i> <span id="generateBtnText">생성 시작</span>
        </button>
        <div id="activity-loading-indicator">
          <i class="fas fa-spinner fa-spin"></i> <span id="loadingText">생성하는 중입니다. 잠시만 기다려주세요...</span>
        </div>
      </div>

      <!-- Activity Check Section (기존 UI 유지, 배경만 변경) -->
      <div id="activityCheck" class="section cb-activity-section" style="display:none;">
        <div id="activityOutputView"></div>
      </div>
    </div>
  </div>

  <script>
    // 탭 상태 동기화를 위한 함수 추가
    const originalShowSection = window.showSection;
    window.showSection = function(sectionId) {
      // 기존 showSection 함수 실행
      if (originalShowSection) {
        originalShowSection(sectionId);
      }
      
      // Class Booster 탭 스타일 업데이트
      document.querySelectorAll('.cb-tab-btn').forEach((btn, index) => {
        const sections = ['upload', 'modeSelect', 'activity', 'activityCheck'];
        if (sections[index] === sectionId) {
          btn.classList.add('active');
        } else {
          btn.classList.remove('active');
        }
      });
    };
  </script>
</body>
</html>
